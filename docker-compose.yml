services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      # These variables are now pulled from your .env file
      - AIHUBMIX_API_KEY=${AIHUBMIX_API_KEY}
      - AIHUBMIX_BASE_URL=${AIHUBMIX_BASE_URL:-https://aihubmix.com/v1}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    networks:
      - gymbuddy-network

 
networks:
  gymbuddy-network:
    driver: bridge
